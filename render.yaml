services:
  - type: web
    name: adam-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: API_SPORTS_KEY
        sync: false
      - key: ODDS_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
